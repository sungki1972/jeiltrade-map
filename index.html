<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>제일유통 — 나무로 잇다 · 대북 산림사업 20년</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌲</text></svg>">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
:root{
  --green:#4ade80; --green-d:#16a34a; --amber:#fbbf24; --cyan:#22d3ee;
  --red:#f87171; --bg:#0b1410; --panel:rgba(13,25,18,.9); --line:rgba(74,222,128,.25);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:'Malgun Gothic','Noto Sans KR',sans-serif;background:var(--bg)}
#map{position:absolute;inset:0;background:#0b1410}
.leaflet-container{background:#0b1410}
#fx{position:absolute;inset:0;z-index:1500;pointer-events:none}

/* ───── 인트로 ───── */
#intro{position:absolute;inset:0;z-index:2600;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;overflow:hidden;
  background:#050a07;transition:opacity 1.4s ease, visibility 1.4s}
#intro.hide{opacity:0;visibility:hidden}
#introBg{position:absolute;inset:0;opacity:.28}
#introBg img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0}
#intro::after{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(5,14,9,.25) 0%,rgba(3,7,5,.95) 78%)}
#intro>*{position:relative;z-index:2}
#intro .eyebrow{color:var(--green);letter-spacing:.55em;font-size:13px;margin-bottom:20px}
#intro h1{color:#f0fdf4;font-size:clamp(34px,5.4vw,66px);font-weight:800;line-height:1.3}
#intro h1 em{font-style:normal;color:var(--green)}
#intro h1 .w{display:inline-block;white-space:pre}
#intro .sub{color:#a7b3ab;margin-top:22px;font-size:clamp(14px,1.6vw,18px);line-height:1.95}
#intro button{margin-top:46px;padding:16px 56px;font-size:17px;font-weight:700;cursor:pointer;
  color:#04150b;background:linear-gradient(135deg,#4ade80,#22c55e);border:none;border-radius:40px;
  box-shadow:0 0 50px rgba(74,222,128,.4);transition:transform .25s}
#intro button:hover{transform:scale(1.07)}

/* ───── 스토리 패널 ───── */
#panel{position:absolute;top:22px;right:22px;width:min(440px,calc(100vw - 44px));max-height:calc(100% - 150px);
  z-index:1700;background:var(--panel);border:1px solid var(--line);border-radius:18px;
  backdrop-filter:blur(16px);box-shadow:0 18px 60px rgba(0,0,0,.55);
  display:flex;flex-direction:column;overflow:hidden;
  transition:transform .55s cubic-bezier(.2,.8,.2,1),opacity .55s}
#panel.off{transform:translateX(46px);opacity:0;pointer-events:none}
#hero{position:relative;height:158px;flex:0 0 auto;overflow:hidden;cursor:zoom-in;background:#08120c}
#hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transform:scale(1.05)}
#hero .shade{position:absolute;inset:0;background:linear-gradient(180deg,transparent 30%,rgba(13,25,18,.95) 100%)}
#hero .hcap{position:absolute;left:16px;bottom:8px;right:16px;color:#cfe8d8;font-size:11.5px;
  text-shadow:0 1px 4px #000}
#hero .hbadge{position:absolute;top:10px;right:12px;background:rgba(0,0,0,.55);color:#d1fae5;
  font-size:11px;padding:4px 10px;border-radius:12px;border:1px solid rgba(255,255,255,.18)}
#panel .head{padding:16px 24px 12px}
#panel .chap-no{color:var(--green);font-size:12px;letter-spacing:.35em;margin-bottom:6px}
#panel h2{color:#f0fdf4;font-size:22px;line-height:1.4}
#panel .body{padding:4px 24px 22px;overflow-y:auto;color:#cbd5d1;font-size:14.5px;line-height:1.85}
#panel .body::-webkit-scrollbar{width:5px}
#panel .body::-webkit-scrollbar-thumb{background:rgba(74,222,128,.3);border-radius:3px}
#panel .body strong{color:#a7f3d0}
#panel .body p+p{margin-top:10px}
.quote{margin:14px 0;padding:12px 16px;border-left:3px solid var(--green);
  background:rgba(74,222,128,.07);border-radius:0 10px 10px 0;color:#d1fae5;font-size:13.5px}
.quote .src{display:block;margin-top:6px;color:#6b7280;font-size:11.5px}
.stats{display:flex;flex-wrap:wrap;gap:10px;margin:16px 0 4px}
.stat{flex:1 1 calc(50% - 5px);background:rgba(255,255,255,.04);border:1px solid rgba(74,222,128,.18);
  border-radius:12px;padding:12px 14px;min-width:120px}
.stat .v{color:var(--green);font-size:21px;font-weight:800;font-variant-numeric:tabular-nums}
.stat .k{color:#9ca3af;font-size:11.5px;margin-top:3px}
.gallery-btn{display:inline-flex;align-items:center;gap:8px;margin-top:14px;padding:9px 18px;
  background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.35);color:#a7f3d0;
  border-radius:24px;font-size:13px;cursor:pointer;transition:.25s}
.gallery-btn:hover{background:rgba(74,222,128,.22)}

/* ───── 내비 + 타임라인 ───── */
#nav{position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:1700;
  display:flex;flex-direction:column;gap:10px;align-items:center}
#tl{width:min(640px,72vw);height:34px;position:relative}
#tl .track{position:absolute;left:0;right:0;top:16px;height:3px;background:rgba(255,255,255,.14);border-radius:2px}
#tl .fill{position:absolute;left:0;top:16px;height:3px;background:linear-gradient(90deg,#16a34a,#4ade80);
  border-radius:2px;width:0;box-shadow:0 0 12px rgba(74,222,128,.5)}
#tl .yr{position:absolute;top:0;font-size:10px;color:#6b7280;transform:translateX(-50%)}
#tl .knob{position:absolute;top:17.5px;width:15px;height:15px;border-radius:50%;background:#4ade80;
  border:3px solid #0b1410;box-shadow:0 0 14px #4ade80;transform:translate(-50%,-50%);left:0}
#tl .ev{position:absolute;top:14px;width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.35);
  transform:translateX(-50%);cursor:pointer}
#tl .ev:hover::after{content:attr(data-t);position:absolute;bottom:14px;left:50%;transform:translateX(-50%);
  white-space:nowrap;background:#0d1912;color:#d1fae5;font-size:11px;padding:4px 10px;border-radius:8px;
  border:1px solid var(--line)}
#navRow{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);
  border-radius:50px;padding:9px 18px;backdrop-filter:blur(14px);box-shadow:0 10px 40px rgba(0,0,0,.5)}
#navRow button{background:none;border:1px solid rgba(74,222,128,.4);color:var(--green);width:36px;height:36px;
  border-radius:50%;font-size:16px;cursor:pointer;transition:.25s}
#navRow button:hover{background:rgba(74,222,128,.15)}
#navRow button:disabled{opacity:.25;cursor:default}
#dots{display:flex;gap:8px}
#dots span{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.18);cursor:pointer;transition:.3s}
#dots span.on{background:var(--green);box-shadow:0 0 10px var(--green);transform:scale(1.25)}
#autoplay{font-size:12px !important;width:auto !important;padding:0 14px;border-radius:20px !important}
#autoplay.playing{background:rgba(74,222,128,.2)}

/* ───── 브랜드/연도/아카이브 버튼 ───── */
#brand{position:absolute;top:22px;left:22px;z-index:1700;display:flex;gap:10px;align-items:stretch}
#brand .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:11px 18px;backdrop-filter:blur(14px)}
#brand .t{color:#f0fdf4;font-weight:800;font-size:16px}
#brand .s{color:#9ca3af;font-size:11px;margin-top:2px}
#archiveBtn{background:var(--panel);border:1px solid var(--line);border-radius:14px;color:#a7f3d0;
  padding:0 18px;cursor:pointer;font-size:13px;backdrop-filter:blur(14px);transition:.25s}
#archiveBtn:hover{background:rgba(74,222,128,.15)}
#year{position:absolute;left:24px;bottom:26px;z-index:1600;color:rgba(74,222,128,.85);
  font-size:clamp(40px,6vw,76px);font-weight:800;font-variant-numeric:tabular-nums;
  text-shadow:0 0 30px rgba(74,222,128,.3);opacity:.9;pointer-events:none;line-height:1}
#year .lbl{display:block;font-size:12px;letter-spacing:.3em;color:#9ca3af;font-weight:400}

/* ───── 지도 마커 ───── */
.mk{position:relative}
.mk .dot{width:14px;height:14px;border-radius:50%;border:2.5px solid #fff;
  box-shadow:0 0 12px rgba(0,0,0,.6);position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.mk .ring{position:absolute;left:50%;top:50%;width:14px;height:14px;border-radius:50%;
  transform:translate(-50%,-50%);animation:ripple 2.2s ease-out infinite}
@keyframes ripple{0%{box-shadow:0 0 0 0 var(--rc)}100%{box-shadow:0 0 0 26px transparent}}
.mk .lab{position:absolute;left:50%;top:-30px;transform:translateX(-50%);white-space:nowrap;
  color:#f0fdf4;font-size:12px;font-weight:700;background:rgba(10,20,14,.85);
  padding:3px 10px;border-radius:14px;border:1px solid rgba(255,255,255,.15)}
.mk .lab small{color:#9ca3af;font-weight:400}
.mk{animation:dropIn .7s cubic-bezier(.2,1.4,.4,1) both}
@keyframes dropIn{from{opacity:0;transform:translateY(-22px) scale(.6)}to{opacity:1;transform:none}}
.mk.dim{filter:grayscale(.9) brightness(.65);animation:none}
.gray-mode .mk .ring{animation:none}
/* 포토 마커 */
.pmk{position:relative;animation:dropIn .8s cubic-bezier(.2,1.4,.4,1) both;cursor:pointer}
.pmk .ph{width:58px;height:58px;border-radius:50%;border:3px solid var(--green);overflow:hidden;
  box-shadow:0 4px 18px rgba(0,0,0,.7),0 0 0 4px rgba(74,222,128,.18);
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);transition:transform .3s}
.pmk:hover .ph{transform:translate(-50%,-50%) scale(1.14)}
.pmk .ph img{width:100%;height:100%;object-fit:cover}
.pmk .n{position:absolute;left:50%;top:50%;transform:translate(13px,-30px);background:var(--green);
  color:#04150b;font-size:11px;font-weight:800;min-width:22px;height:22px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;padding:0 5px;border:2px solid #0b1410;z-index:5}
.pmk .plab{position:absolute;left:50%;top:62px;transform:translateX(-50%);white-space:nowrap;
  color:#d1fae5;font-size:11px;background:rgba(10,20,14,.85);padding:2px 9px;border-radius:10px;
  border:1px solid rgba(255,255,255,.12)}

/* ───── 갤러리 라이트박스 ───── */
#gal{position:absolute;inset:0;z-index:3200;background:rgba(2,6,4,.94);display:none;
  flex-direction:column;align-items:center;justify-content:center}
#gal.show{display:flex}
#gal .stage{position:relative;width:88%;height:72%;display:flex;align-items:center;justify-content:center}
#gal .stage img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 20px 90px rgba(0,0,0,.85)}
#gal .cap{color:#d1fae5;margin-top:14px;font-size:14.5px;max-width:80%;text-align:center}
#gal .cnt{color:#6b7280;font-size:12px;margin-top:6px;letter-spacing:.2em}
#gal .gbtn{position:absolute;top:50%;transform:translateY(-50%);width:52px;height:52px;border-radius:50%;
  background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.4);color:var(--green);
  font-size:22px;cursor:pointer;transition:.25s;z-index:5}
#gal .gbtn:hover{background:rgba(74,222,128,.28)}
#galPrev{left:3%}#galNext{right:3%}
#galClose{position:absolute;top:24px;right:30px;background:none;border:none;color:#9ca3af;
  font-size:34px;cursor:pointer;z-index:5}
#galThumbs{display:flex;gap:7px;margin-top:16px;max-width:86%;overflow-x:auto;padding:4px}
#galThumbs img{height:48px;border-radius:6px;opacity:.45;cursor:pointer;transition:.25s;flex:0 0 auto}
#galThumbs img.on{opacity:1;outline:2px solid var(--green)}
#galThumbs::-webkit-scrollbar{height:5px}
#galThumbs::-webkit-scrollbar-thumb{background:rgba(74,222,128,.3);border-radius:3px}

/* ───── 아카이브 오버레이 ───── */
#arch{position:absolute;inset:0;z-index:3000;background:rgba(4,9,6,.96);display:none;flex-direction:column}
#arch.show{display:flex}
#arch .ahead{display:flex;align-items:center;gap:18px;padding:24px 36px 14px;flex-wrap:wrap}
#arch h3{color:#f0fdf4;font-size:22px}
#arch .ftr{display:flex;gap:8px;flex-wrap:wrap}
#arch .ftr button{background:rgba(255,255,255,.05);border:1px solid rgba(74,222,128,.25);color:#cbd5d1;
  border-radius:18px;padding:6px 16px;font-size:12.5px;cursor:pointer;transition:.25s}
#arch .ftr button.on{background:rgba(74,222,128,.2);color:#d1fae5;border-color:var(--green)}
#arch .close{margin-left:auto;background:none;border:none;color:#9ca3af;font-size:30px;cursor:pointer}
#archGrid{flex:1;overflow-y:auto;padding:10px 36px 36px;display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;align-content:start}
#archGrid .cell{position:relative;border-radius:10px;overflow:hidden;cursor:zoom-in;aspect-ratio:4/3;
  border:1px solid rgba(255,255,255,.08);opacity:0;transform:translateY(16px)}
#archGrid .cell img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
#archGrid .cell:hover img{transform:scale(1.08)}
#archGrid .cell .c{position:absolute;left:0;right:0;bottom:0;padding:18px 9px 7px;font-size:10.5px;
  color:#d1fae5;background:linear-gradient(transparent,rgba(0,0,0,.85))}
#archGrid::-webkit-scrollbar{width:6px}
#archGrid::-webkit-scrollbar-thumb{background:rgba(74,222,128,.3);border-radius:3px}

#hint{position:absolute;right:28px;bottom:30px;z-index:1600;color:#6b7280;font-size:11.5px;text-align:right}
.leaflet-control-attribution{background:rgba(10,20,14,.7)!important;color:#6b7280!important}
.leaflet-control-attribution a{color:#9ca3af!important}
@media (max-width:760px){
  #panel{top:auto;bottom:120px;right:10px;left:10px;width:auto;max-height:46vh}
  #hero{height:110px}
  #year{bottom:auto;top:84px}
  #tl{display:none}
}
</style>
</head>
<body>
<div id="map"></div>
<canvas id="fx"></canvas>

<div id="brand">
  <div class="card"><div class="t">제일유통 JEIL TRADE</div><div class="s">대북 산림사업 1997–2018 · 발표용 지도</div></div>
  <button id="archiveBtn">📷 사진 아카이브 <b id="archCount"></b></button>
</div>
<div id="year"><span class="lbl">YEAR</span><span id="yearNum">1997</span></div>

<div id="panel" class="off">
  <div id="hero"><div class="shade"></div><div class="hcap" id="heroCap"></div><div class="hbadge" id="heroBadge"></div></div>
  <div class="head"><div class="chap-no" id="chapNo"></div><h2 id="chapTitle"></h2></div>
  <div class="body" id="chapBody"></div>
</div>

<div id="nav">
  <div id="tl"><div class="track"></div><div class="fill" id="tlFill"></div><div class="knob" id="tlKnob"></div></div>
  <div id="navRow">
    <button id="prev" title="이전 (←)">‹</button>
    <div id="dots"></div>
    <button id="next" title="다음 (→)">›</button>
    <button id="autoplay" title="자동 재생">▶ 자동</button>
  </div>
</div>

<div id="hint">← → 방향키 이동 · 지도 위 사진 마커 클릭 = 갤러리<br>패널 상단 사진 클릭 = 확대</div>

<div id="intro">
  <div id="introBg"></div>
  <div class="eyebrow">JEIL TRADE · 1997 – 2018</div>
  <h1 id="introTitle">사람 통일은 못하더라도<br><em>나무 통일</em>은 하고 싶었다</h1>
  <div class="sub">경남 진주의 한 기업이 중국 훈춘에서 개성 개풍까지,<br>
  묘목 1,400만 주로 이어 간 대북 산림협력 20년 — 사진 55장과 함께 따라갑니다</div>
  <button id="startBtn">지도에서 시작하기 →</button>
</div>

<div id="gal">
  <button id="galClose">✕</button>
  <div class="stage"><button class="gbtn" id="galPrev">‹</button><img id="galImg" src="" alt=""><button class="gbtn" id="galNext">›</button></div>
  <div class="cap" id="galCap"></div><div class="cnt" id="galCnt"></div>
  <div id="galThumbs"></div>
</div>

<div id="arch">
  <div class="ahead">
    <h3>사진 아카이브</h3>
    <div class="ftr" id="archFtr"></div>
    <button class="close" id="archClose">✕</button>
  </div>
  <div id="archGrid"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="photos.js"></script>
<script>
/* ═══════════ 사진 헬퍼 (photos.js의 그룹 필드 기준) ═══════════ */
const byGroup = g => PHOTOS.filter(x=>x.g===g);
const GP=byGroup('개성 개풍양묘장'), PY=byGroup('평양'), CN=byGroup('중국 기지'),
      DOC=PHOTOS.filter(x=>x.g==='증빙 문서'||x.g==='계약서 원본');
document.getElementById('archCount').textContent = PHOTOS.length;

/* ═══════════ 지도 ═══════════ */
const map = L.map('map',{zoomControl:false,attributionControl:true,zoomSnap:.25})
  .setView([38.6,127.2],7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
  maxZoom:18, attribution:'&copy; OpenStreetMap &copy; CARTO'}).addTo(map);
const layer = L.layerGroup().addTo(map);
let anims=[];
function clearAnims(){anims.forEach(a=>{if(a.raf)cancelAnimationFrame(a.raf);if(a.iv)clearInterval(a.iv);if(a.to)clearTimeout(a.to)});anims=[]}
function clearAll(){clearAnims();layer.clearLayers();document.body.classList.remove('gray-mode');fxStop()}

const P = {
  진주:[35.18,128.11], 서울:[37.566,126.978], 도라산:[37.897,126.71],
  개성:[37.97,126.555], 개풍:[37.95,126.43],
  평양:[39.03,125.755], 만경대:[39.01,125.66], 중화군:[38.85,125.80], 룡봉:[39.06,125.70],
  봉산군:[38.52,126.20], 곡산:[38.80,126.66], 배천:[37.99,126.32],
  원산:[39.15,127.44], 성천:[39.27,126.22],
  무산:[42.22,129.22], 회령:[42.43,129.75], 남양:[42.93,129.84],
  샛별:[42.81,130.22], 라선:[42.25,130.30], 신의주:[40.10,124.40],
  훈춘:[42.86,130.36], 용정:[42.77,129.42], 연길:[42.90,129.50],
  해림:[44.57,129.38], 단동:[40.12,124.39]
};

/* ═══════════ 마커 ═══════════ */
const COLORS={green:'#4ade80',amber:'#fbbf24',cyan:'#22d3ee',red:'#f87171',white:'#e5e7eb'};
function marker(pos,label,sub,color='green',delay=0,pulse=true){
  const c=COLORS[color];
  const html=`<div class="mk" style="animation-delay:${delay}ms">
    ${pulse?`<div class="ring" style="--rc:${c}66"></div>`:''}
    <div class="dot" style="background:${c}"></div>
    <div class="lab">${label}${sub?` <small>${sub}</small>`:''}</div></div>`;
  return L.marker(pos,{icon:L.divIcon({html,className:'',iconSize:[0,0]})}).addTo(layer);
}
/* 포토 마커: 썸네일 원형 + 장수 배지 → 클릭 시 갤러리 */
function photoMarker(pos,list,label,delay=0){
  if(!list.length)return;
  const html=`<div class="pmk" style="animation-delay:${delay}ms">
    <div class="ph"><img src="images/${list[0].f}" alt=""></div>
    <div class="n">${list.length}</div>
    <div class="plab">${label}</div></div>`;
  const m=L.marker(pos,{icon:L.divIcon({html,className:'',iconSize:[58,58],iconAnchor:[29,29]}),zIndexOffset:800}).addTo(layer);
  m.on('click',()=>openGallery(list,0));
  return m;
}

/* ═══════════ 흐름선 ═══════════ */
function bezier(a,b,curve=.25,n=60){
  const mx=(a[0]+b[0])/2,my=(a[1]+b[1])/2,dx=b[0]-a[0],dy=b[1]-a[1];
  const cx=mx-dy*curve,cy=my+dx*curve,pts=[];
  for(let i=0;i<=n;i++){const t=i/n;
    pts.push([(1-t)**2*a[0]+2*(1-t)*t*cx+t*t*b[0],(1-t)**2*a[1]+2*(1-t)*t*cy+t*t*b[1]]);}
  return pts;
}
function flow(a,b,{color='#4ade80',curve=.25,draw=1400,weight=2.5,dotR=4,delay=0}={}){
  const pts=bezier(a,b,curve);
  const line=L.polyline([],{color,weight,opacity:.85,dashArray:'7 9'}).addTo(layer);
  const glow=L.polyline([],{color,weight:weight*3.2,opacity:.12}).addTo(layer);
  const t0={to:setTimeout(()=>{
    const start=performance.now(); const h={};
    h.raf=requestAnimationFrame(function step(now){
      const k=Math.min((now-start)/draw,1);
      const upto=pts.slice(0,Math.max(2,Math.floor(k*pts.length)));
      line.setLatLngs(upto);glow.setLatLngs(upto);
      if(k<1){h.raf=requestAnimationFrame(step)}
      else{
        let off=0;h.iv=setInterval(()=>{off=(off-1+32)%32;line.setStyle({dashOffset:String(off)})},60);
        const dot=L.circleMarker(pts[0],{radius:dotR,color:'#fff',weight:1.5,fillColor:color,fillOpacity:1}).addTo(layer);
        let i=0;const h2={iv:setInterval(()=>{i=(i+1)%pts.length;dot.setLatLng(pts[i])},45)};
        anims.push(h2);
      }
    });
    anims.push(h);
  },delay)};
  anims.push(t0);
}

const fx=document.getElementById('fx'), fctx=fx.getContext('2d');
let fxMode=null,fxRaf=null,parts=[];
function fxResize(){fx.width=innerWidth;fx.height=innerHeight}
addEventListener('resize',fxResize);fxResize();
function fxStart(mode){
  fxMode=mode;parts=[];
  const n=mode==='snow'?140:60;
  for(let i=0;i<n;i++)parts.push({x:Math.random()*fx.width,y:Math.random()*fx.height,
    r:mode==='snow'?1+Math.random()*2.4:1.2+Math.random()*2.2,
    vy:mode==='snow'?.4+Math.random()*1.1:.15+Math.random()*.45,
    vx:(Math.random()-.5)*.5, ph:Math.random()*Math.PI*2});
  if(!fxRaf)fxLoop();
}
function fxStop(){fxMode=null;parts=[];if(fxRaf){cancelAnimationFrame(fxRaf);fxRaf=null}
  fctx.clearRect(0,0,fx.width,fx.height)}
function fxLoop(){
  fxRaf=requestAnimationFrame(fxLoop);
  fctx.clearRect(0,0,fx.width,fx.height);
  if(!fxMode)return;
  const col=fxMode==='snow'?'rgba(226,232,240,.75)':'rgba(74,222,128,.55)';
  parts.forEach(p=>{
    p.ph+=.012;p.y+=p.vy;p.x+=p.vx+Math.sin(p.ph)*.4;
    if(p.y>fx.height+8){p.y=-8;p.x=Math.random()*fx.width}
    if(p.x<-8)p.x=fx.width+8; if(p.x>fx.width+8)p.x=-8;
    fctx.beginPath();fctx.arc(p.x,p.y,p.r,0,7);fctx.fillStyle=col;fctx.fill();
  });
}

      const m=marker(p,n,s,'red',i*220,false);

    const dmz=[[37.78,124.7],[37.95,126.65],[38.32,127.4],[38.61,128.36]];

/* ═══════════ 타임라인 ═══════════ */
const TL0=1996,TL1=2019;
const tl=document.getElementById('tl');
[1997,2000,2005,2010,2015,2018].forEach(y=>{
  const d=document.createElement('div');d.className='yr';
  d.style.left=((y-TL0)/(TL1-TL0)*100)+'%';d.textContent=y;tl.appendChild(d);});
[[1997,'훈춘 기지'],[1999,'첫 북송'],[2005,'통일부 승인'],[2006,'개풍 식수'],
 [2007,'1000만주 확인'],[2010,'5.24'],[2016,'보상신청'],[2018,'단동 접촉']].forEach(([y,t])=>{
  const e=document.createElement('div');e.className='ev';e.dataset.t=`${y} ${t}`;
  e.style.left=((y-TL0)/(TL1-TL0)*100)+'%';tl.appendChild(e);});
function tlGo(y){
  const k=(y-TL0)/(TL1-TL0)*100;
  gsap.to('#tlKnob',{left:k+'%',duration:1.1,ease:'power2.inOut'});
  gsap.to('#tlFill',{width:k+'%',duration:1.1,ease:'power2.inOut'});
}

/* ═══════════ 내비게이션 ═══════════ */
let cur=-1,playing=false,playTimer=null;
const dotsEl=document.getElementById('dots');
CH.forEach((c,i)=>{const d=document.createElement('span');d.onclick=()=>go(i);dotsEl.appendChild(d)});

function go(i){
  if(i<0||i>=CH.length||i===cur)return;
  cur=i;const c=CH[i];
  clearAll();
  document.querySelectorAll('#dots span').forEach((d,k)=>d.classList.toggle('on',k===i));
  document.getElementById('prev').disabled=(i===0);
  document.getElementById('next').disabled=(i===CH.length-1);
  const panel=document.getElementById('panel');
  panel.classList.add('off');
  anims.push({to:setTimeout(()=>{
    document.getElementById('chapNo').textContent=c.no+`  ·  ${i+1} / ${CH.length}`;
    document.getElementById('chapTitle').textContent=c.title;
    document.getElementById('chapBody').innerHTML=c.body;
    heroSet(c.hero||[],c.badge);
    panel.classList.remove('off');
    gsap.from('#chapBody > *',{opacity:0,y:14,duration:.55,stagger:.08,ease:'power2.out',delay:.15});
    document.querySelectorAll('.gallery-btn').forEach(b=>
      b.onclick=()=>openGallery(GSETS[b.dataset.g]||PHOTOS,0));
  },380)});
  setYear(c.year);tlGo(c.year);
  map.flyTo(c.view.c,c.view.z,{duration:2.1,easeLinearity:.18});
  anims.push({to:setTimeout(()=>c.setup&&c.setup.call(c),600)});
}
document.getElementById('prev').onclick=()=>go(cur-1);
document.getElementById('next').onclick=()=>go(cur+1);
document.addEventListener('keydown',e=>{
  if(gal.classList.contains('show')){
    if(e.key==='ArrowRight'){gIdx=(gIdx+1)%gList.length;renderGal()}
    if(e.key==='ArrowLeft'){gIdx=(gIdx-1+gList.length)%gList.length;renderGal()}
    if(e.key==='Escape')gal.classList.remove('show');
    return;
  }
  if(arch.classList.contains('show')){if(e.key==='Escape')arch.classList.remove('show');return}
  if(e.key==='ArrowRight'||e.key==='PageDown'){e.preventDefault();go(cur+1)}
  if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(cur-1)}
});

const apBtn=document.getElementById('autoplay');
apBtn.onclick=()=>{
  playing=!playing;apBtn.classList.toggle('playing',playing);
  apBtn.textContent=playing?'⏸ 정지':'▶ 자동';
  if(playing)playTimer=setInterval(()=>{if(cur<CH.length-1)go(cur+1);
    else{playing=false;apBtn.classList.remove('playing');apBtn.textContent='▶ 자동';clearInterval(playTimer)}},15000);
  else clearInterval(playTimer);
};

/* ═══════════ 인트로 시네마틱 ═══════════ */
(function introCinema(){
  const bg=document.getElementById('introBg');
  const picks=[GP[1],CN[1],PY[2],GP[15]||GP[3]].filter(Boolean);
  picks.forEach(p=>{const im=document.createElement('img');im.src='images/'+p.f;bg.appendChild(im)});
  const imgs=bg.querySelectorAll('img');let bi=0;
  function cyc(){
    imgs.forEach((im,k)=>gsap.to(im,{opacity:k===bi%imgs.length?1:0,duration:2}));
    gsap.fromTo(imgs[bi%imgs.length],{scale:1.0},{scale:1.12,duration:7,ease:'none'});
    bi++;
  }
  cyc();setInterval(cyc,6000);
  // 제목 단어 스태거
  const h1=document.getElementById('introTitle');
  h1.innerHTML=h1.innerHTML.split(/(<br>|<em>.*?<\/em>)/g).map(seg=>{
    if(seg.startsWith('<'))return seg;
    return seg.split(' ').filter(Boolean).map(w=>`<span class="w">${w} </span>`).join('');
  }).join('');
  gsap.from('#intro .eyebrow',{opacity:0,y:18,duration:1,delay:.3});
  gsap.from('#introTitle .w, #introTitle em',{opacity:0,y:26,duration:.8,stagger:.1,delay:.7,ease:'power3.out'});
  gsap.from('#intro .sub',{opacity:0,y:18,duration:1,delay:1.9});
  gsap.from('#intro button',{opacity:0,y:18,scale:.9,duration:.9,delay:2.4,ease:'back.out(1.6)'});
  fxStart('seeds');
})();

document.getElementById('startBtn').onclick=()=>{
  document.getElementById('intro').classList.add('hide');
  fxStop();
  setTimeout(()=>go(0),400);
};
</script>
